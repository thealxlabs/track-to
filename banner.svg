<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0e14"/>
      <stop offset="100%" style="stop-color:#161924"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#da291c"/>
      <stop offset="100%" style="stop-color:#f05540"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFCD00;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FFCD00;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A650;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00A650;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="line3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0070C0;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0070C0;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid dots -->
  <g opacity="0.07">
    <circle cx="50" cy="50" r="1.2" fill="#fff"/>
    <circle cx="100" cy="50" r="1.2" fill="#fff"/>
    <circle cx="150" cy="50" r="1.2" fill="#fff"/>
    <circle cx="200" cy="50" r="1.2" fill="#fff"/>
    <circle cx="250" cy="50" r="1.2" fill="#fff"/>
    <circle cx="300" cy="50" r="1.2" fill="#fff"/>
    <circle cx="50" cy="100" r="1.2" fill="#fff"/>
    <circle cx="100" cy="100" r="1.2" fill="#fff"/>
    <circle cx="150" cy="100" r="1.2" fill="#fff"/>
    <circle cx="200" cy="100" r="1.2" fill="#fff"/>
    <circle cx="250" cy="100" r="1.2" fill="#fff"/>
    <circle cx="300" cy="100" r="1.2" fill="#fff"/>
    <circle cx="50" cy="150" r="1.2" fill="#fff"/>
    <circle cx="100" cy="150" r="1.2" fill="#fff"/>
    <circle cx="150" cy="150" r="1.2" fill="#fff"/>
    <circle cx="200" cy="150" r="1.2" fill="#fff"/>
    <circle cx="250" cy="150" r="1.2" fill="#fff"/>
    <circle cx="300" cy="150" r="1.2" fill="#fff"/>
    <circle cx="700" cy="50" r="1.2" fill="#fff"/>
    <circle cx="750" cy="50" r="1.2" fill="#fff"/>
    <circle cx="800" cy="50" r="1.2" fill="#fff"/>
    <circle cx="850" cy="50" r="1.2" fill="#fff"/>
    <circle cx="700" cy="100" r="1.2" fill="#fff"/>
    <circle cx="750" cy="100" r="1.2" fill="#fff"/>
    <circle cx="800" cy="100" r="1.2" fill="#fff"/>
    <circle cx="850" cy="100" r="1.2" fill="#fff"/>
    <circle cx="700" cy="150" r="1.2" fill="#fff"/>
    <circle cx="750" cy="150" r="1.2" fill="#fff"/>
    <circle cx="800" cy="150" r="1.2" fill="#fff"/>
    <circle cx="850" cy="150" r="1.2" fill="#fff"/>
  </g>

  <!-- Subway line stripes (decorative) -->
  <line x1="0" y1="190" x2="900" y2="190" stroke="url(#line1)" stroke-width="2.5" opacity="0.5"/>
  <line x1="0" y1="184" x2="900" y2="184" stroke="url(#line2)" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="179" x2="900" y2="179" stroke="url(#line3)" stroke-width="1.5" opacity="0.35"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="200" fill="url(#accent)" rx="3" filter="url(#subtleglow)"/>

  <!-- Logo icon -->
  <rect x="40" y="62" width="56" height="56" rx="14" fill="url(#accent)" filter="url(#glow)" opacity="0.95"/>
  <text x="68" y="99" font-size="28" text-anchor="middle" dominant-baseline="middle">🚌</text>

  <!-- Main title -->
  <text x="118" y="90" font-family="'Courier New', Courier, monospace" font-size="46" font-weight="700" fill="#eaeef8" letter-spacing="-2" filter="url(#subtleglow)">TrackTO</text>

  <!-- Subtitle -->
  <text x="120" y="118" font-family="'Courier New', Courier, monospace" font-size="14" fill="#6b7a9e" letter-spacing="2">TORONTO TRANSIT · LIVE</text>

  <!-- Version badge -->
  <rect x="118" y="131" width="46" height="18" rx="4" fill="#da291c" opacity="0.15"/>
  <rect x="118" y="131" width="46" height="18" rx="4" fill="none" stroke="#da291c" stroke-width="1" opacity="0.4"/>
  <text x="141" y="143" font-family="'Courier New', Courier, monospace" font-size="10" font-weight="700" fill="#f05540" text-anchor="middle" letter-spacing="0.5">v4.0.0</text>

  <!-- Node badge -->
  <rect x="172" y="131" width="60" height="18" rx="4" fill="#15803d" opacity="0.12"/>
  <rect x="172" y="131" width="60" height="18" rx="4" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.35"/>
  <text x="202" y="143" font-family="'Courier New', Courier, monospace" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="0.5">Node.js</text>

  <!-- No deps badge -->
  <rect x="240" y="131" width="74" height="18" rx="4" fill="#1d4ed8" opacity="0.12"/>
  <rect x="240" y="131" width="74" height="18" rx="4" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.35"/>
  <text x="277" y="143" font-family="'Courier New', Courier, monospace" font-size="10" font-weight="700" fill="#60a5fa" text-anchor="middle" letter-spacing="0.5">0 deps</text>

  <!-- Right side — stats panel -->
  <rect x="590" y="35" width="270" height="130" rx="10" fill="#1d2130" stroke="#282d3f" stroke-width="1"/>

  <!-- Stat items -->
  <!-- Vehicles -->
  <text x="615" y="68" font-family="'Courier New', Courier, monospace" font-size="11" fill="#4a5270" letter-spacing="1">LIVE VEHICLES</text>
  <text x="615" y="90" font-family="'Courier New', Courier, monospace" font-size="26" font-weight="700" fill="#f05540" filter="url(#subtleglow)">1,800+</text>

  <!-- Divider -->
  <line x1="730" y1="50" x2="730" y2="150" stroke="#282d3f" stroke-width="1"/>

  <!-- Routes -->
  <text x="748" y="68" font-family="'Courier New', Courier, monospace" font-size="11" fill="#4a5270" letter-spacing="1">ROUTES</text>
  <text x="748" y="90" font-family="'Courier New', Courier, monospace" font-size="26" font-weight="700" fill="#FFCD00">200+</text>

  <!-- Divider 2 -->
  <line x1="615" y1="105" x2="845" y2="105" stroke="#282d3f" stroke-width="1"/>

  <!-- Rate limit -->
  <text x="615" y="124" font-family="'Courier New', Courier, monospace" font-size="11" fill="#4a5270" letter-spacing="1">RATE LIMIT</text>
  <text x="615" y="143" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="700" fill="#eaeef8">120 req/min</text>

  <!-- Endpoints -->
  <text x="748" y="124" font-family="'Courier New', Courier, monospace" font-size="11" fill="#4a5270" letter-spacing="1">ENDPOINTS</text>
  <text x="748" y="143" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="700" fill="#eaeef8">12 public</text>

  <!-- Live indicator dot -->
  <circle cx="845" cy="38" r="5" fill="#22c55e" opacity="0.9" filter="url(#subtleglow)"/>
  <circle cx="845" cy="38" r="9" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
</svg>
